<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoTub</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>VideoTub</h1>
      <p>Anonymous video uploads. Auto-delete after 24 hours.</p>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>Upload Video</h2>
        <p id="upload-rules" class="hint">Loading upload rules...</p>
        <form id="upload-form">
          <label>
            Title
            <input type="text" name="title" maxlength="100" placeholder="Video title" />
          </label>
          <label>
            Description
            <textarea name="description" maxlength="800" rows="3" placeholder="Short description"></textarea>
          </label>
          <label>
            Tags (comma-separated, e.g. games, funny)
            <input type="text" name="tags" maxlength="200" placeholder="games, clip, meme" />
          </label>
          <label>
            Keep for
            <select name="retentionHours" id="retention-select"></select>
          </label>
          <label>
            Video File
            <input type="file" name="video" accept=".mp4,.webm,.mkv,.mov,.avi,.m4v,video/*" required />
          </label>
          <button type="submit" id="upload-btn">Upload</button>
        </form>
        <p id="upload-status" class="status"></p>
      </section>

      <section class="panel">
        <div class="actions" style="justify-content:space-between;align-items:center">
          <h2 style="margin:0">Latest Videos</h2>
          <input id="search-input" type="search" placeholder="Search…" />
        </div>
        <div id="tag-bar" class="tag-bar"></div>
        <div id="video-list" class="cards"></div>
        <div class="actions" style="justify-content:center">
          <button id="prev-btn" type="button" style="display:none">← Prev</button>
          <span id="page-info" class="hint"></span>
          <button id="next-btn" type="button" style="display:none">Next →</button>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
