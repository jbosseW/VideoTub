<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watch - VideoTub</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="link" href="/">Back to Home</a>
      <h1>Watch Video</h1>
    </header>

    <main class="layout">
      <section class="panel wide">
        <h2 id="video-title">Loading...</h2>
        <p id="video-meta" class="hint"></p>
        <video id="player" controls autoplay class="player"></video>
        <p id="video-description"></p>
        <div class="actions">
          <button id="report-btn" type="button">Report this video</button>
          <button id="delete-btn" type="button" style="display:none">Delete my video</button>
        </div>
        <p id="action-status" class="hint"></p>
      </section>
    </main>

    <script src="/watch.js"></script>
  </body>
</html>
